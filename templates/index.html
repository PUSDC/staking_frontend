<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝕏 Login with Supabase</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <svg viewBox="0 0 24 24" aria-hidden="true" width="60" height="60" fill="white">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.451-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"></path>
            </svg>
        </div>
        
        <h1>欢迎回来</h1>
        <p class="muted">连接您的 X (Twitter) 账号，<br>体验秒级极速登录。</p>
        
        {% if user %}
            <div class="user-card">
                <div class="info-item" style="width: 100%;">
                    <span class="label">已登录用户</span>
                    <span class="value">{{ user.name }}</span>
                </div>
            </div>
        {% endif %}

        <div class="forum-list" style="margin-top: 30px; text-align: left;">
            <h2 style="font-size: 1.2rem; margin-bottom: 15px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">社区动态</h2>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                {% if posts %}
                    {% for post in posts %}
                        <div class="info-item post-item">
                            <span class="label">#{{ post.id }}</span>
                            <span class="value" style="display: block; margin-bottom: 4px;">{{ post.title }}</span>
                            <span class="muted" style="font-size: 0.85rem; margin-bottom: 0;">{{ post.created_at }}</span>
                        </div>
                    {% endfor %}
                {% else %}
                    <p class="muted">暂无帖子分享。</p>
                {% endif %}
            </div>
        </div>

        <div style="margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
            {% if not user %}
                <a href="{{ url_for('login_twitter') }}" class="btn-twitter">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.451-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"></path>
                    </svg>
                    使用 𝕏 登录
                </a>
                <button id="metamask-btn" class="btn-metamask" onclick="loginWithMetaMask()">
                    <span class="metamask-icon"></span>
                    使用 MetaMask 登录
                </button>
            {% else %}
                <div style="display: flex; gap: 10px;">
                    <a href="{{ url_for('dashboard') }}" class="btn-twitter" style="background: var(--primary); color: white; width: 60%;">
                        个人主页
                    </a>
                    <a href="{{ url_for('logout') }}" class="btn-secondary" style="margin-top: 0; width: 40%;">退出</a>
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        async function loginWithMetaMask() {
            if (typeof window.ethereum === 'undefined') {
                alert('请安装 MetaMask 钱包!');
                return;
            }
            
            try {
                const btn = document.getElementById('metamask-btn');
                btn.disabled = true;
                btn.textContent = '连接中...';
                
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const address = accounts[0];
                
                const timestamp = Math.floor(Date.now() / 1000);
                const message = `Welcome to Staking DApp!\n\nWallet: ${address}\nTimestamp: ${timestamp}`;
                
                const signature = await window.ethereum.request({
                    method: 'personal_sign',
                    params: [message, address]
                });
                
                const response = await fetch('/api/auth/wallet/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, signature, timestamp })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    window.location.reload();

            } catch (error) {
                console.error('MetaMask error:', error);
                alert('连接失败: ' + error.message);
                const btn = document.getElementById('metamask-btn');
                btn.disabled = false;
                btn.textContent = '使用 MetaMask 登录';

    </script>
</body>
</html>
