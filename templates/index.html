<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝕏 Login with Supabase</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <svg viewBox="0 0 24 24" aria-hidden="true" width="60" height="60" fill="white">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.451-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"></path>
            </svg>
        </div>
        
        <h1>欢迎回来</h1>
        <p class="muted">连接您的 X (Twitter) 账号，<br>体验秒级极速登录。</p>
        
        {% if user %}
            <div class="user-card">
                <div class="info-item" style="width: 100%;">
                    <span class="label">已登录用户</span>
                    <span class="value">{{ user.name }}</span>
                </div>
                <div style="display: flex; flex-direction: column; width: 100%; gap: 10px;">
                    <a href="{{ url_for('dashboard') }}" class="btn-twitter" style="background: var(--primary); color: white;">
                        进入控制面板
                    </a>
                    <a href="{{ url_for('logout') }}" class="btn-secondary">安全退出</a>
                </div>
            </div>
        {% else %}
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <a href="{{ url_for('login_twitter') }}" class="btn-twitter">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.451-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"></path>
                    </svg>
                    使用 𝕏 登录
                </a>
                <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 10px;">
                    通过 OAuth 2.0 PKCE 安全验证
                </p>
            </div>
        {% endif %}
    </div>
</body>
</html>
